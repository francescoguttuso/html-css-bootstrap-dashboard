<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>dashboard</title>
    <!-- Bootstrap icon CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-body mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="img/img/duck.png" alt="Bootstrap" width="50" height="50">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll"
                aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarScroll">
                <ul class="navbar-nav me-auto my-2 my-lg-0 navbar-nav-scroll" style="--bs-scroll-height: 100px;">
                    <li class="nav-item">
                        <a class="nav-link active text-white" aria-current="page" href="#">Catalogo Libri</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Anagrafica Utenti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Storico Prestiti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Help</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <h3 class="d-inline">Nuovo Libro</h3>
        <!--Form-->
        <!--name e surname-->
        <div class="row g-3 mt-2">
            <div class="col-6">
                <label for="NomeAutore" class="form-label fw-semibold">Nome Autore</label>
                <input type="text" class="form-control" id="NomeAutore" placeholder="Inserisci il nome dell'autore">
            </div>
            <div class="col-6">
                <label for="Cognome Autore" class="form-label fw-semibold">Cognome Autore</label>
                <input type="text" class="form-control" id="CognomeAutore"
                    placeholder="Inserisci il cognome dell'autore">
            </div>
            <div class="col-12">
                <label for="Titololibro" class="form-label fw-semibold">Titolo</label>
                <input type="text" class="form-control" id="Titololibro" placeholder="Inserisci il titolo del libro">
                <div class="form-text" id="basic-addon4">Titolo versione italiana</div>
            </div>
        </div>
        <!--type film-->
        <div class="row mb-3 align-items-end">
            <div class="col-12 col-md-4 mt-3">
                <div class="mb-1">
                    <label for="genre" class="col-form-select fw-semibold">Genere</label>
                </div>
                <select class="form-select" id="genre">
                    <option selected>Scegli il genere</option>
                    <option value="1">Commedia</option>
                    <option value="2">horror</option>
                    <option value="3">Thriller</option>
                    <option value="4">Drammatico</option>
                </select>
            </div>
            <div class="col-12 col-md-4 mt-3">
                <label for="year" class="form-label fw-semibold">Anno di Pubblicazione</label>
                <input type="text" class="form-control" id="year" placeholder="Inserisci l'anno">
            </div>
            <div class="col-12 col-md-4 mt-3">
                <label for="codeisbn" class="form-label fw-semibold">ISBN#</label>
                <input type="text" class="form-control" id="codeisbn" placeholder="Inserisci il codice ISBN#">
            </div>
        </div>
        <hr class="my-4">
        <!--note-->
        <div>
            <label for="Textarea" class="form-label fw-semibold">Note</label>
            <textarea class="form-control" id="Textarea" rows="3"
                placeholder="Inserisci eventuali note sul libro"></textarea>
        </div>
        <!--checkbox-->
        <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" value="" id="checkDefault">
            <label class="form-check-label fw-semibold" for="checkDefault">
                Disponibile anche in digitale
            </label>
        </div>

        <button type="button" class="btn btn-primary mt-3 ">Aggiungi Libro</button>
    </div>
</body>
